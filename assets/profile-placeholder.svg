<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Nagatanmayee Gunukula portrait placeholder</title>
  <desc id="desc">A luminous blue and purple tech-style portrait placeholder with the initials NG.</desc>
  <defs>
    <radialGradient id="bg" cx="36%" cy="28%" r="78%">
      <stop offset="0" stop-color="#7df9ff"/>
      <stop offset="0.35" stop-color="#7b61ff"/>
      <stop offset="0.72" stop-color="#19133f"/>
      <stop offset="1" stop-color="#070b1f"/>
    </radialGradient>
    <linearGradient id="ring" x1="120" x2="620" y1="80" y2="650">
      <stop stop-color="#4cc9f0"/>
      <stop offset="0.55" stop-color="#b56cff"/>
      <stop offset="1" stop-color="#ff6fd8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="720" fill="url(#bg)"/>
  <g opacity="0.35" stroke="#d9f5ff" stroke-width="2">
    <path d="M75 186C190 86 331 95 453 174s116 238 44 341-224 118-342 33S-40 286 75 186Z" fill="none"/>
    <path d="M166 128c98 45 195 44 303 0M104 518c128-58 260-58 396 0M82 360h556M360 66c-60 168-60 349 0 588M228 92c108 157 158 339 111 547M492 94c-106 154-155 335-110 542" fill="none"/>
  </g>
  <circle cx="360" cy="360" r="246" fill="none" stroke="url(#ring)" stroke-width="16" filter="url(#glow)"/>
  <circle cx="360" cy="360" r="190" fill="rgba(7,11,31,0.58)" stroke="rgba(255,255,255,0.22)" stroke-width="4"/>
  <g filter="url(#glow)">
    <text x="360" y="386" text-anchor="middle" fill="#f7fbff" font-family="Inter, Arial, sans-serif" font-size="138" font-weight="800" letter-spacing="0">NG</text>
    <text x="360" y="454" text-anchor="middle" fill="#74f7c4" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700" letter-spacing="0">CS + CLOUD + AI</text>
  </g>
  <g fill="#ffffff">
    <circle cx="156" cy="190" r="5" opacity="0.85"/>
    <circle cx="558" cy="180" r="4" opacity="0.7"/>
    <circle cx="585" cy="502" r="5" opacity="0.75"/>
    <circle cx="126" cy="528" r="4" opacity="0.65"/>
    <circle cx="456" cy="94" r="3" opacity="0.7"/>
  </g>
